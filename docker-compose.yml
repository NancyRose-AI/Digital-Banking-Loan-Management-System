version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: digital_banking_db
    environment:
      POSTGRES_DB: digital_banking
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: digital_banking_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
