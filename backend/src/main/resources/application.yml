spring:
  application:
    name: digital-banking

  # ---------------------------------------------------------------------------
  # Database — H2 FILE-BASED (persists across backend restarts)
  # The DB file lives at:  backend/data/bankdb.mv.db
  # Change "mem:" to "file:" is the ONLY change needed to survive restarts.
  # AUTO_SERVER=TRUE allows the H2 Console and the app to share the same file.
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:h2:file:~/.digital-banking/bankdb
    driverClassName: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # ---------------------------------------------------------------------------
  # Redis — disabled for local development (no Redis server required)
  # RedisConfig.java is already commented out; this exclusion stops Spring Boot
  # auto-configuration from trying to connect on startup.
  # ---------------------------------------------------------------------------
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

server:
  port: 8080
  ssl:
    enabled: false

